name: SSH Smoke Test
on:
  workflow_dispatch:
jobs:
  ssh-test:
    runs-on: self-hosted  # your runner label
    steps:
      - name: Run test command
        run: |
          echo "SUCCESS - running on $(hostname)"
          echo "Date: $(date)"
          echo "github-actions-ok" > /tmp/ssh_test.txt
          cat /tmp/ssh_test.txt
