name: SSH Smoke Test

on:
  workflow_dispatch:

jobs:
  ssh-test:
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Add VM to known hosts
        run: |
          ssh-keyscan -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts

      - name: Run remote test command
        run: |
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} << 'EOF'
          echo "SSH SUCCESS"
          echo "Hostname: $(hostname)"
          echo "Date: $(date)"

          # create a file to prove write access
          echo "github-actions-ssh-ok" > /tmp/ssh_test.txt

          echo "File created:"
          cat /tmp/ssh_test.txt
          EOF
