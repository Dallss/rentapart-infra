name: deploy
on:
  workflow_dispatch:
  repository_dispatch:
    types: [deploy]
jobs:
  deploy:
    runs-on: deploy
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: |
          echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Deploy
        run: |
          docker compose pull
          docker compose up -d --remove-orphans
